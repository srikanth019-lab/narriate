<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Gallery</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/emoji gallery.css') }}">
</head>
<body>

<div class="container">

    <!-- Top Bar -->
    <header class="top-bar">

        <a href="{{ url_for('emojis_search_page') }}" class="back-btn">
            ←
        </a>

        <div class="emoji-info">
            <span class="emoji">{{ emoji.emoji }}</span>
            <span class="emoji-name">{{ emoji.name }}</span>
        </div>

       <form
    action="{{ url_for('emoji_gallery', emoji_id=emoji.id) }}"
    method="POST"
    enctype="multipart/form-data"
    id="uploadForm"
>

    <input
        type="file"
        id="imageInput"
        name="image"
        hidden
        accept="image/*,video/*"
        
    >

    <button
        type="button"
        class="add-btn"
        onclick="document.getElementById('imageInput').click();"
    >
        ＋
    </button>

</form>

    </header>

    <!-- Post Count -->
    <div class="post-count">
        <strong>{{ posts|length }}</strong> Posts
    </div>

    <!-- Gallery -->

    <div class="gallery-grid">

    {% for post in posts %}
    <div class="gallery-item">
        {% if post.media_type == "image" %}
        <a href="{{ url_for('view_post', post_id=post.id) }}">
            <img src="{{ post.image_url }}" alt="">
        </a>
        {% elif post.media_type == "video" %}
              <a href="{{ url_for('view_post', post_id=post.id) }}">
    <video class="gallery-video" muted>
        <source src="{{ post.image_url }}" type="video/mp4">
    </video>
    </a>
        {% endif %}
    </div>

    {% endfor %}

</div>

</div><script>
const input = document.getElementById("imageInput");
const form = document.getElementById("uploadForm");

input.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    if (file.type.startsWith("image/")) {
        form.submit();
        return;
    }

    if (file.type.startsWith("video/")) {
        const video = document.createElement("video");
        video.preload = "metadata";

        video.onloadedmetadata = function () {
            URL.revokeObjectURL(video.src);

            if (video.duration > 60) {
                alert("Video must be 1 minute or less.");
                input.value = "";
                return;
            }

            form.submit();
        };

        video.src = URL.createObjectURL(file);
    }
});
</script>

</body>
</html>
