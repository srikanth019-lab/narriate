<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/live.css') }}">
</head>
<body>

<div class="live-container">

    <!-- Camera -->
    <video id="video" autoplay muted></video>

    <!-- Top -->
    <div class="top-bar">
        <div class="live-badge">LIVE</div>
        <div>Friends</div>
    </div>

    <div class="live-dot"></div>

    <!-- Right Side Controls -->
    <div class="controls">

        <!-- Viewer -->
        <div class="control-group">
            <div class="control-btn">👁</div>
            <div class="count" id="viewerCount">0</div>
        </div>

        <!-- Like -->
        <div class="control-group">
            <div class="control-btn" id="likeBtn">👍</div>
            <div class="count" id="likeCount">100</div>
        </div>

        <!-- Heart -->
        <div class="control-group">
            <div class="control-btn" id="heartBtn">❤️</div>
            <div class="count" id="heartCount">100</div>
        </div>

        <!-- Live End Button -->
        <div class="live-end-btn" id="endLiveBtn"></div>

        <!-- Get Viewers Button -->
        <div class="get-viewers-btn" id="getViewersBtn">Get Viewers</div>

    </div>

    <!-- Bottom Comment -->
    <div class="comment-section">
        💬
        <div class="comment-box">Comments will appear here</div>
    </div>

</div>

<script src="{{ url_for('static', filename='live.js') }}"></script>
</body>
</html>
