<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Viewer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/view.css') }}">
</head>
<body>

<div class="viewer-container">👁

    <!-- Live Video (Demo placeholder video) -->
    <video autoplay loop muted>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <!-- Top -->
    <div class="top-bar">
        <div class="live-badge">LIVE</div>
        <div class="viewer-count">👁<span id="viewerCount">10m</span></div>
    </div>

    <!-- Right Controls -->
    <div class="controls">

        <!-- Like -->
        <div class="control-group">
            <div class="control-btn" id="likeBtn">👍</div>
            <div class="count" id="likeCount">100</div>
        </div>

        <!-- Heart -->
        <div class="control-group">
            <div class="control-btn" id="heartBtn">❤️</div>
            <div class="count" id="heartCount">1000000</div>
        </div>

    </div>

    <!-- Comments -->
    <div class="comments-box" id="commentsBox"></div>

    <!-- Comment Input -->
    <div class="comment-input-area">
        <input type="text" id="commentInput" class="comment-input" placeholder="Write a comment...">
        <button class="send-btn" id="sendBtn">Send</button>
    </div>

</div>

<script src="{{ url_for('static', filename='js/view.js') }}"></script>
</body>
</html>
